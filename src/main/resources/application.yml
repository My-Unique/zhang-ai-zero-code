spring:
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_zero_code
    username: root
    password: 123456
  profiles:
    active: local
  application:
    name:  zhang-ai-zero-code
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      ttl: 3600
      user: default
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000


server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
#      cookie 30天过期
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'AI-zero-code'
      packages-to-scan: com.unique.zhangaizerocode.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
